# Safety Policies for MCP Servers
# These policies are enforced across all MCP operations

policies:
  # Critical Security Policies
  - name: block_rm_rf_root
    description: Block rm -rf on root directory
    condition: "command.matches('rm\\s+-rf\\s+/')"
    action: deny
    severity: critical
    message: "Destructive command on root filesystem blocked"

  - name: block_format_disk
    description: Block disk formatting commands
    condition: "command.matches('mkfs|format')"
    action: deny
    severity: critical
    message: "Disk formatting commands blocked"

  - name: no_hardcoded_secrets
    description: Detect hardcoded secrets in production
    condition: "content.matches('password\\s*=|secret\\s*=|api_key\\s*=')"
    action: deny
    severity: critical
    message: "Potential hardcoded secret detected"

  - name: no_eval_exec
    description: Block eval and exec in code
    condition: "content.matches('eval\\s*\\(|exec\\s*\\(')"
    action: warn
    severity: high
    message: "eval() or exec() usage detected - security risk"

  # Deployment Policies
  - name: no_prod_deploy_without_tests
    description: Require passing tests before production deploy
    condition: "operation == 'execution/deploy' and params.target == 'production'"
    action: require_approval
    severity: high
    message: "Production deployment requires manual approval"

  - name: no_weekend_prod_deploy
    description: Restrict production deployments on weekends
    condition: "operation == 'execution/deploy' and params.target == 'production' and context.day in ['Saturday', 'Sunday']"
    action: deny
    severity: medium
    message: "Production deployments not allowed on weekends"

  # Quality Gates
  - name: security_risk_threshold
    description: Require approval for high security risks
    condition: "security.risk_score > 75"
    action: require_approval
    severity: high
    message: "High security risk detected - approval required"

  - name: test_coverage_threshold
    description: Warn on low test coverage
    condition: "coverage.percent < 50"
    action: warn
    severity: medium
    message: "Test coverage below 50%"

  - name: high_complexity_warning
    description: Warn on high cyclomatic complexity
    condition: "complexity.score > 15"
    action: warn
    severity: low
    message: "High complexity detected - consider refactoring"

  # Database Safety
  - name: db_write_protection
    description: Protect against unintended database writes
    condition: "operation == 'db/query' and not params.read_only"
    action: require_approval
    severity: high
    message: "Database write operation requires approval"

  - name: db_deletion_protection
    description: Protect against database deletions
    condition: "params.query.matches('drop|delete|truncate')"
    action: require_approval
    severity: critical
    message: "Destructive database operation requires approval"

  # Audit Policies
  - name: audit_destructive_operations
    description: Log all destructive operations
    condition: "operation.matches('delete|remove|drop|destroy')"
    action: log
    severity: low
    message: "Destructive operation logged"

  - name: audit_git_push
    description: Log all git push operations
    condition: "operation == 'git/push'"
    action: log
    severity: low
    message: "Git push operation logged"
