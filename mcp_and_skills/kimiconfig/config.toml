# Kimi CLI Configuration
# Documentation: https://docs.kimi.com/cli/configuration

# Skills directory - where to load custom skills from
skills-dir = "/home/donovan/.config/agents/skills"

# Feature flags
[features]
# Enable remote MCP client for skills that require MCP servers
rmcp_client = true

# Optional: Default model configuration
# [model]
# provider = "openai"
# model = "gpt-4"

# Optional: API keys (better to use environment variables)
# [providers.openai]
# api_key = "sk-..."
