# SuperNova — Full Infrastructure Stack
# Usage: docker compose up -d
# E2E tests: docker compose --profile test up --abort-on-container-exit

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL + pgvector (Semantic Memory + Checkpoints)
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: supernova
      POSTGRES_USER: supernova
      POSTGRES_PASSWORD: supernova_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supernova"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis (Working Memory + Celery Broker)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Neo4j (Episodic Memory — Graphiti)
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/supernova_neo4j_dev
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p supernova_neo4j_dev 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Langfuse (Observability)
  # ---------------------------------------------------------------------------
  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://supernova:supernova_dev_password@postgres:5432/supernova
      NEXTAUTH_SECRET: supernova-langfuse-secret
      NEXTAUTH_URL: http://localhost:3000
      SALT: supernova-langfuse-salt
      TELEMETRY_ENABLED: "false"
    ports:
      - "3000:3000"

  # ---------------------------------------------------------------------------
  # SuperNova API (profile: app)
  # ---------------------------------------------------------------------------
  supernova:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:8000"

volumes:
  pgdata:
  redisdata:
  neo4jdata:
