name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Job 0: Repository hygiene — block tracked secrets and generated blobs
  # ────────────────────────────────────────────────────────────────────
  repo-hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tracked files
        run: python scripts/validate_repo_hygiene.py

  # ────────────────────────────────────────────────────────────────────
  # Job 1: Python quality (lint + type-check + test)
  # ────────────────────────────────────────────────────────────────────
  python-quality:
    name: Python — Lint, Typecheck, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supernova

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: supernova_test
          POSTGRES_USER: supernova
          POSTGRES_PASSWORD: supernova_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff — format check
        run: ruff format --check .

      - name: Ruff — lint
        run: ruff check .

      - name: MyPy — type check
        run: mypy . --ignore-missing-imports

      - name: Pytest — unit tests (no infrastructure required)
        env:
          DATABASE_URL: postgresql+asyncpg://supernova:supernova_test@localhost:5432/supernova_test
          REDIS_URL: redis://localhost:6379
          OPENAI_API_KEY: sk-test-placeholder
          ANTHROPIC_API_KEY: sk-ant-test-placeholder
          SUPERNOVA_SECRET_KEY: ci-test-secret-key-not-real
        run: |
          pytest -m "unit" \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: supernova/coverage.xml
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────────────
  # Job 2: Frontend quality (lint + type-check + unit tests)
  # ────────────────────────────────────────────────────────────────────
  frontend-quality:
    name: Frontend — Lint, Typecheck, Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run type-check

      - name: Vitest unit tests
        run: npm run test:unit

  # ────────────────────────────────────────────────────────────────────
  # Job 3: Security scan — detect secrets accidentally committed
  # ────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
