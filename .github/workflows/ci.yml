name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "hardening/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        working-directory: supernova
        run: pip install -e ".[dev]"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate tracked files
        run: python scripts/validate_repo_hygiene.py

      - name: MyPy
        working-directory: supernova
        run: mypy . --ignore-missing-imports

  test-python:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: supernova_test
          POSTGRES_USER: supernova
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        working-directory: supernova
        run: pip install -e ".[dev]"

      - name: Run unit tests (no integration)
        working-directory: supernova
        env:
          DATABASE_URL: postgresql+asyncpg://supernova:testpass@localhost:5432/supernova_test
          REDIS_URL: redis://localhost:6379/0
          OPENAI_API_KEY: sk-test-placeholder
          SUPERNOVA_SECRET_KEY: test-secret-key-32chars-minimum!!
        run: |
          pytest -m "unit" \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          name: coverage-report
          path: supernova/coverage.xml

  test-frontend:
    name: Frontend (TypeScript + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit
