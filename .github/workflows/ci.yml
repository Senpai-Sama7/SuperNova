name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'hardening/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python: lint + type-check ──────────────────────────────────────────────
  python-quality:
    name: Python Quality (Ruff + MyPy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dev dependencies
        working-directory: supernova
        run: pip install -e '.[dev]'

      - name: Ruff lint
        working-directory: supernova
        run: ruff check .

      - name: Ruff format check
        working-directory: supernova
        run: ruff format --check .

      - name: MyPy type check
        working-directory: supernova
        run: mypy . --ignore-missing-imports

  # ── Python: unit tests with coverage gate ──────────────────────────────────
  python-test:
    name: Python Tests (Pytest ≥80% coverage)
    runs-on: ubuntu-latest
    needs: python-quality

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: supernova
          POSTGRES_DB: supernova_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://supernova:testpass@localhost:5432/supernova_test
      REDIS_URL: redis://localhost:6379/0
      OPENAI_API_KEY: sk-test-placeholder
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dev dependencies
        working-directory: supernova
        run: pip install -e '.[dev]'

      - name: Run unit tests
        working-directory: supernova
        run: |
          pytest tests/ \
            -m "not integration and not slow" \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: supernova/coverage.xml

  # ── Frontend: type-check + lint + unit tests ───────────────────────────────
  frontend:
    name: Frontend (tsc + ESLint + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Vitest unit tests
        run: npm run test:unit -- --reporter=verbose
