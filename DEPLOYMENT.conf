# =============================================================================
# deploy/systemd/supernova-agent.service
#
# Systemd unit file for the SuperNova agent process.
#
# Why systemd over a Rust supervisor (and why this is the correct choice):
#   Systemd is the process supervisor used by the Linux kernel itself to
#   manage every system service on your machine. It implements:
#     - Dependency ordering (After=, Requires=) via D-Bus and socket activation
#     - Automatic restart with exponential backoff (StartLimitBurst + RestartSec)
#     - Resource cgroups-v2 integration (MemoryMax, CPUQuota, TasksMax)
#     - Security namespacing (PrivateTmp, ProtectSystem, NoNewPrivileges)
#     - Journal integration for centralized, structured log collection
#     - Socket activation: systemd can hold the listening socket open across
#       agent restarts, achieving zero downtime for new connections
#
#   A custom Rust supervisor would re-implement ~15% of systemd's surface
#   area with none of its maturity (systemd has 15+ years of production hardening).
#   The only scenarios where a custom supervisor earns its weight over systemd:
#     1. Pre-warming application-level state caches before the first request
#        (e.g., loading a 7B model into VRAM before accepting connections)
#     2. Custom distributed health-check protocols not expressible in systemd's
#        health model
#     3. Cross-machine coordination (Kubernetes handles this instead)
#
#   For a personal agent on a VPS: systemd is strictly superior.
#
# Deployment:
#   sudo cp deploy/systemd/*.service /etc/systemd/system/
#   sudo systemctl daemon-reload
#   sudo systemctl enable --now supernova-agent supernova-worker supernova-beat
#
# Monitor:
#   sudo journalctl -u supernova-agent -f            # Live logs
#   sudo systemctl status supernova-agent            # Health + recent events
#   sudo systemctl restart supernova-agent           # Graceful restart
# =============================================================================

[Unit]
Description=SuperNova Personal AI Agent
Documentation=https://github.com/yourhandle/supernova
After=network-online.target postgresql.service redis.service
Wants=network-online.target
Requires=supernova-worker.service

# If the agent crashes, restart the worker too
PropagatesStopTo=supernova-worker.service supernova-beat.service

[Service]
Type=exec
User=supernova
Group=supernova
WorkingDirectory=/opt/supernova

# Load secrets from an environment file NOT in source control.
# This file should be owned by root, readable only by root,
# with the specific values sourced by systemd into the service's environment.
# Alternative: HashiCorp Vault Agent writes /run/supernova/secrets.env
# with short-lived credentials on each rotation.
EnvironmentFile=/etc/supernova/secrets.env
EnvironmentFile=/etc/supernova/config.env

# The main process
ExecStart=/opt/supernova/.venv/bin/uvicorn api.gateway:app \
    --host 127.0.0.1 \
    --port 8000 \
    --workers 2 \
    --loop uvloop \
    --http httptools \
    --log-level info \
    --access-log \
    --no-use-colors

# Pre-start database migrations (idempotent Alembic upgrade)
ExecStartPre=/opt/supernova/.venv/bin/alembic upgrade head

# Graceful shutdown: send SIGTERM, wait 30s for in-flight requests,
# then SIGKILL. This is critical for agents mid-tool-execution.
KillMode=mixed
KillSignal=SIGTERM
TimeoutStopSec=30

# ── Restart policy ────────────────────────────────────────────────────────────
# Restart on any non-zero exit code (crashes, OOM kills, etc.)
# but NOT on intentional stop (systemctl stop).
Restart=on-failure
RestartSec=5                 # Wait 5s before restart (allows DB connections to settle)
StartLimitBurst=5            # Allow 5 rapid restarts...
StartLimitIntervalSec=60     # ...within a 60-second window before giving up

# ── Resource limits (cgroups-v2) ──────────────────────────────────────────────
# These are HARD LIMITS — systemd will OOM-kill the process if exceeded,
# preventing the agent from degrading the host system.
MemoryMax=2G                 # Agent process + asyncpg pool + Python heap
MemorySwapMax=0              # Disable swap for this service (prevents latency spikes)
CPUQuota=200%                # 2 full CPU cores; process may burst above on idle system
TasksMax=512                 # Limit thread count (Python threads + asyncio internal)

# ── Security hardening ────────────────────────────────────────────────────────
# These directives restrict the service's capabilities to the minimum required.
# Each restriction reduces the attack surface if the agent is compromised.
NoNewPrivileges=yes           # Cannot gain new privileges via setuid binaries
PrivateTmp=yes                # Gets an isolated /tmp — cannot see other services' temp files
ProtectSystem=strict          # /usr, /boot, /etc are read-only
ProtectHome=yes               # Cannot access /home (except the service user's own)
ReadWritePaths=/opt/supernova/data /var/log/supernova  # Explicit write allowlist
PrivateDevices=yes            # Cannot access hardware devices
RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX  # Network + Unix sockets only
RestrictNamespaces=yes        # Cannot create namespaces (container escape prevention)
LockPersonality=yes           # Cannot change ABI personality
MemoryDenyWriteExecute=yes    # Cannot allocate executable memory (JIT blocker — note:
                              # this may conflict with some Python extensions like numba;
                              # remove if you need JIT compilation in tools)
SystemCallFilter=@system-service  # Allow only syscalls appropriate for a server process

[Install]
WantedBy=multi-user.target

---
# =============================================================================
# deploy/systemd/supernova-worker.service
# Celery worker for background task execution
# =============================================================================

[Unit]
Description=SuperNova Celery Background Worker
After=network-online.target redis.service postgresql.service
PartOf=supernova-agent.service   # Lifecycle coupled to the main agent

[Service]
Type=exec
User=supernova
Group=supernova
WorkingDirectory=/opt/supernova
EnvironmentFile=/etc/supernova/secrets.env
EnvironmentFile=/etc/supernova/config.env

ExecStart=/opt/supernova/.venv/bin/celery -A workers worker \
    --loglevel=info \
    --concurrency=4 \
    --pool=gevent \
    --queues=default,heartbeat,consolidation,maintenance \
    --max-tasks-per-child=1000 \
    --time-limit=3600 \
    --soft-time-limit=3300

Restart=on-failure
RestartSec=10
MemoryMax=1G
CPUQuota=100%
NoNewPrivileges=yes
PrivateTmp=yes

[Install]
WantedBy=multi-user.target

---
# =============================================================================
# deploy/systemd/supernova-beat.service
# Celery Beat cron scheduler
# =============================================================================

[Unit]
Description=SuperNova Celery Beat Scheduler
After=network-online.target redis.service
PartOf=supernova-agent.service

[Service]
Type=exec
User=supernova
Group=supernova
WorkingDirectory=/opt/supernova
EnvironmentFile=/etc/supernova/secrets.env
EnvironmentFile=/etc/supernova/config.env

ExecStart=/opt/supernova/.venv/bin/celery -A workers beat \
    --loglevel=info \
    --scheduler=redbeat.RedBeatScheduler \
    --pidfile=/var/run/supernova/beat.pid

Restart=on-failure
RestartSec=30   # Beat restart less urgent than worker/agent
MemoryMax=256M
CPUQuota=25%
NoNewPrivileges=yes
PrivateTmp=yes

[Install]
WantedBy=multi-user.target

---
# =============================================================================
# deploy/Dockerfile
#
# Multi-stage build for minimal production image.
#
# Stage 1 (builder): Full build environment with compilers, headers, build tools.
#   Installs all Python packages, compiles C extensions (asyncpg, uvloop, etc.)
#
# Stage 2 (production): Minimal runtime image.
#   Copies only the installed packages and application code.
#   No build tools, no compilers, no package manager caches.
#   Result: ~400-600MB image vs ~1.2GB builder image.
#
# Why not Alpine Linux?
#   Alpine uses musl libc instead of glibc. Several Python packages with
#   C extensions (asyncpg, uvloop, numpy) either don't have musl wheels or
#   require compilation from source, dramatically slowing CI and occasionally
#   producing subtle numerical differences (musl math vs glibc math).
#   python:3.12-slim (Debian Bookworm slim) is the pragmatic choice: small
#   (~130MB), glibc-based, full wheel availability.
# =============================================================================

FROM python:3.12-slim AS builder

# Install build dependencies
# These are needed to compile: asyncpg (C), uvloop (Cython), msgpack (C),
# and any other packages with C extensions.
RUN apt-get update && apt-get install -y --no-install-recommends \
    build-essential \
    libpq-dev \
    curl \
    git \
    && rm -rf /var/lib/apt/lists/*

WORKDIR /build

# Install uv — Astral's Rust-implemented Python package manager.
# uv is 10-100x faster than pip for dependency resolution and installation,
# which matters significantly in CI where image rebuilds happen frequently.
RUN curl -LsSf https://astral.sh/uv/install.sh | sh
ENV PATH="/root/.cargo/bin:$PATH"

# Copy dependency specifications first.
# Docker layer caching: if requirements don't change, dependency installation
# is skipped on rebuild — the most expensive step becomes a cache hit.
COPY pyproject.toml uv.lock ./

# Install dependencies into a virtual environment at /build/.venv
# --frozen: use exact versions from lockfile (reproducible builds)
# --no-dev: exclude development dependencies from production image
RUN uv sync --frozen --no-dev

# Copy application source
COPY . .

# ── Production stage ──────────────────────────────────────────────────────────
FROM python:3.12-slim AS production

# Install only runtime system dependencies (no compilers)
RUN apt-get update && apt-get install -y --no-install-recommends \
    libpq5 \
    curl \
    && rm -rf /var/lib/apt/lists/* \
    && useradd --system --create-home --shell /bin/bash supernova

# Copy the virtual environment and application from the builder stage
COPY --from=builder /build/.venv /opt/supernova/.venv
COPY --from=builder /build /opt/supernova

# Set PATH to use the virtual environment Python
ENV PATH="/opt/supernova/.venv/bin:$PATH"
ENV PYTHONPATH="/opt/supernova"

# Ensure the supernova user owns the application directory
RUN chown -R supernova:supernova /opt/supernova

USER supernova
WORKDIR /opt/supernova

# Expose the FastAPI port
EXPOSE 8000

# Health check for Docker's own health monitoring
HEALTHCHECK --interval=30s --timeout=10s --start-period=20s --retries=3 \
    CMD curl -sf http://localhost:8000/health || exit 1

# The default command is overridden by docker-compose.yml
# This is the standalone Docker run command for development
CMD ["uvicorn", "api.gateway:app", "--host", "0.0.0.0", "--port", "8000"]

---
# =============================================================================
# deploy/nginx/supernova.conf
#
# Nginx reverse proxy configuration for production deployment.
#
# Nginx sits in front of the FastAPI process and handles:
#   1. TLS termination (via Certbot/Let's Encrypt certificates)
#   2. WebSocket upgrade protocol (for streaming agent responses)
#   3. Rate limiting (global + per-IP) to prevent abuse
#   4. Static file serving (if you add a frontend)
#   5. Request buffering: Nginx can hold slow client connections while
#      FastAPI processes quickly, preventing Slowloris attacks
#
# WebSocket special handling:
#   HTTP/1.1 WebSocket uses the Upgrade header mechanism.
#   Nginx must explicitly proxy Upgrade and Connection headers, and must
#   use HTTP/1.1 (not 1.0) to the upstream — HTTP/1.0 does not support
#   the Connection: upgrade mechanism.
#   The proxy_read_timeout must be long enough for slow LLM responses
#   (Claude streaming can take 30-120s for long outputs).
# =============================================================================

# Rate limiting zones
# Zone "general": 60 requests/minute per IP (burst to 10)
# Zone "ws_connect": 10 WebSocket connections/minute per IP
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=ws_connect:10m rate=10r/m;

upstream supernova_api {
    server 127.0.0.1:8000;
    keepalive 32;   # Maintain persistent connections to FastAPI workers
}

upstream supernova_langfuse {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name yourdomain.com;

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # TLS configuration (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' wss:";

    # ── WebSocket endpoint for streaming agent responses ────────────────────
    location /agent/stream/ {
        limit_req zone=ws_connect burst=5 nodelay;

        proxy_pass         http://supernova_api;
        proxy_http_version 1.1;

        # WebSocket upgrade headers — required for the Upgrade mechanism
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for slow LLM streaming responses
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 10s;

        # Disable buffering: WebSocket and SSE require data to flow through immediately
        proxy_buffering off;
    }

    # ── REST API endpoints ───────────────────────────────────────────────────
    location /api/ {
        limit_req zone=general burst=20 nodelay;

        proxy_pass         http://supernova_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection     "";   # keepalive to upstream
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 5s;

        # Buffer responses before sending to client
        # (appropriate for REST, not WebSocket/SSE)
        proxy_buffer_size   4k;
        proxy_buffers       8 4k;
    }

    # ── Health check (unrate-limited, for load balancers / uptime monitors) ──
    location /health {
        proxy_pass http://supernova_api/health;
        access_log off;   # Don't pollute logs with health check requests
    }

    # ── Langfuse dashboard (optionally restrict to internal IP) ─────────────
    location /langfuse/ {
        # Uncomment to restrict Langfuse to internal network:
        # allow 10.0.0.0/8;
        # deny all;

        proxy_pass http://supernova_langfuse/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
